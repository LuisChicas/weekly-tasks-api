service: weekly-tasks-api

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-2
  stage: ${opt:stage, 'dev'}
  environment:
    TABLE_NAME: ${self:service}-${self:provider.stage}
    JWT_SECRET: ${env:JWT_SECRET, 'dev-secret-change-in-production'}
    DYNAMODB_ENDPOINT: ${env:DYNAMODB_ENDPOINT, ''}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:BatchWriteItem
          Resource:
            - !GetAtt TaskListsTable.Arn
            - !Join ['/', [!GetAtt TaskListsTable.Arn, 'index/*']]

functions:
  api:
    handler: src/handler.handler
    url: ${self:custom.functionUrl.${self:provider.stage}}
    events: ${self:custom.events.${self:provider.stage}}

resources:
  Resources:
    TaskListsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: username
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: UsernameIndex
            KeySchema:
              - AttributeName: username
                KeyType: HASH
            Projection:
              ProjectionType: ALL

plugins:
  - serverless-esbuild
  - serverless-offline

custom:
  functionUrl:
    dev: false
    prod: true
  events:
    dev:
      - httpApi:
          method: ANY
          path: /{proxy+}
      - httpApi:
          method: ANY
          path: /
    prod: []
  serverless-offline:
    httpPort: 3009
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    platform: node
    target: node20
